; ==============================================================================
; Project      : ESP32-S3 BOOT Interrupt BLE HID
; Workspace    : ESP32S3_Boot_BLE_HID_PIO
; Framework    : Arduino on ESP32-S3
; HID Library  : HijelHID_BLEKeyboard
; ==============================================================================
;
; MODO NORMAL / SEM DEBUG
; ------------------------------------------------------------------------------
; Upload local:
;   Porta USB-UART CH343
;   Porta Windows: COM12
;
; Build local:
;   PlatformIO: Build
;   Atalho VS Code: Ctrl + Alt + B
;
; Upload local:
;   PlatformIO: Upload
;   Atalho VS Code: Ctrl + Alt + U
;
; Terminal local:
;   pio run -e esp32s3_uart
;   pio run -e esp32s3_uart -t upload
;
; Bibliotecas baixadas automaticamente pelo PlatformIO:
;   - Adafruit NeoPixel
;   - NimBLE-Arduino
;   - HijelHID_BLEKeyboard via GitHub
;
; GitHub Actions:
;   O workflow baixa as bibliotecas via PlatformIO.
;   Nao e necessario versionar bibliotecas dentro da pasta lib/.
;
; ATENCAO:
;   Este INI nao usa debug_tool.
;   Este INI nao usa COM13.
;   Este INI nao usa USB-JTAG.
;   Este INI usa somente COM12 para gravacao local.
;
; ==============================================================================

[platformio]
default_envs = esp32s3_uart

[env:esp32s3_uart]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

upload_port = COM12
monitor_port = COM12

upload_speed = 460800
monitor_speed = 115200

lib_deps =
    adafruit/Adafruit NeoPixel
    h2zero/NimBLE-Arduino
    https://github.com/HijelHub/HijelHID_BLEKeyboard.git