name: Manual Firmware Release Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish firmware release
    runs-on: ubuntu-latest

    env:
      BASE_VERSION: v1.0.0
      PLATFORMIO_ENV: esp32s3_uart
      PROJECT_NAME: ESP32S3_Boot_BLE_HID_PIO

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set automatic version variables
        shell: bash
        run: |
          TAG="${BASE_VERSION}.${GITHUB_RUN_NUMBER}"
          PACKAGE_NAME="${PROJECT_NAME}_${TAG}"

          echo "TAG=${TAG}" >> "$GITHUB_ENV"
          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> "$GITHUB_ENV"

          echo "Release tag: ${TAG}"
          echo "Package name: ${PACKAGE_NAME}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/penv
            .pio
          key: platformio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            platformio-${{ runner.os }}-

      - name: Install PlatformIO
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Install project libraries
        shell: bash
        run: |
          pio pkg install -e "${PLATFORMIO_ENV}"

      - name: Build firmware
        shell: bash
        run: |
          pio run -e "${PLATFORMIO_ENV}"

      - name: Prepare release firmware
        shell: bash
        run: |
          mkdir -p release

          cp ".pio/build/${PLATFORMIO_ENV}/firmware.bin" "release/${PACKAGE_NAME}.bin"

          cat > "release/BUILD_INFO_${TAG}.txt" << EOF
          Project: ${PROJECT_NAME}
          Version: ${TAG}
          Base version: ${BASE_VERSION}
          Build number: ${GITHUB_RUN_NUMBER}
          Environment: ${PLATFORMIO_ENV}
          Board: esp32-s3-devkitc-1
          Framework: Arduino
          Build date UTC: $(date -u +"%Y-%m-%d %H:%M:%S")
          Git commit: ${GITHUB_SHA}
          Git branch/ref: ${GITHUB_REF_NAME}
          GitHub run number: ${GITHUB_RUN_NUMBER}
          GitHub run ID: ${GITHUB_RUN_ID}

          Stable firmware baseline:
          - BLE HID using HijelHID_BLEKeyboard
          - Wi-Fi + NTP time synchronization
          - SW BOOT interrupt on GPIO0
          - RGB LED on GPIO48
          - Text sent character by character
          - No TAB
          - Fixed line ending: \n
          - GitHub Actions builds firmware only; upload to board remains local.
          EOF

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: |
            release/${{ env.PACKAGE_NAME }}.bin
            release/BUILD_INFO_${{ env.TAG }}.txt
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Stable BLE HID WiFi NTP Firmware ${{ env.TAG }}
          prerelease: false
          generate_release_notes: true
          files: |
            release/${{ env.PACKAGE_NAME }}.bin